services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - mysql
      - rabbitmq
    networks:
      - app

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - app

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: user
      MYSQL_PASSWORD: usersecret
      MYSQL_ROOT_PASSWORD: rootsecret
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - app

  vite:
    image: node:20-alpine
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: [ "npm", "run", "dev", "--", "--host" ]
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - app
    networks:
      - app

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: user
    networks:
      - app

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan queue:work
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - app
      - rabbitmq
    networks:
      - app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: php artisan schedule:work
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - app
    networks:
      - app

volumes:
  mysql:

networks:
  app:
    driver: bridge
